<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- Sélecteur de caméra -->
  <div id="camera-selector" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#111;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;">
    <h2>Choisir une caméra</h2>
    <select id="camera-list" style="font-size:16px;padding:8px;margin:16px;width:80%;max-width:400px;"></select>
    <button onclick="startAR()" style="font-size:16px;padding:10px 30px;cursor:pointer;">Démarrer</button>
  </div>

  <div id="ar-container" style="display:none;width:100%;height:100%;">
    <a-scene id="ar-scene" embedded arjs>
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" material="color: red;"></a-box>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <script>
    let selectedDeviceId = null;

    // Demande la permission caméra puis liste les périphériques
    navigator.mediaDevices.getUserMedia({ video: true }).then(() => {
      return navigator.mediaDevices.enumerateDevices();
    }).then(devices => {
      const cameras = devices.filter(d => d.kind === 'videoinput');
      const select = document.getElementById('camera-list');
      cameras.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.text = cam.label || 'Caméra ' + (i + 1);
        select.appendChild(opt);
      });
    }).catch(err => alert('Erreur accès caméra : ' + err.message));

    function startAR() {
      selectedDeviceId = document.getElementById('camera-list').value;
      document.getElementById('camera-selector').style.display = 'none';
      const scene = document.getElementById('ar-scene');
      scene.setAttribute('arjs', 'sourceType: webcam; deviceId: ' + selectedDeviceId + ';');
      document.getElementById('ar-container').style.display = 'block';
    }
  </script>

</body>
</html>
